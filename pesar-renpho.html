<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesar con Renpho - iPad</title>
  <style>
    body { font-family: -apple-system, Arial; text-align: center; padding: 40px 20px; background: #f8f9fa; }
    button { 
      padding: 20px 40px; 
      font-size: 20px; 
      background: #007aff; 
      color: white; 
      border: none; 
      border-radius: 12px; 
      margin: 20px;
    }
    #status { margin: 30px; font-size: 18px; min-height: 60px; }
  </style>
</head>
<body>
  <h1>Lectura de Báscula Renpho</h1>
  <button onclick="connectAndRead()">Conectar Báscula y Leer Peso</button>
  <div id="status">Presiona el botón y pisa la báscula con pies descalzos</div>

  <script>
    let device = null;
    let characteristic = null;

    async function connectAndRead() {
      const status = document.getElementById('status');
      status.textContent = "Buscando báscula QN-Scale...";

      try {
        device = await navigator.bluetooth.requestDevice({
          filters: [{ name: "QN-Scale" }],
          optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"]
        });

        status.textContent = "Conectando a la báscula...";
        const server = await device.gatt.connect();

        const service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
        characteristic = await service.getCharacteristic("0000ffe1-0000-1000-8000-00805f9b34fb");

        await characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', handleNotification);

        status.textContent = "✅ Conectado. Pisa la báscula ahora...";

      } catch (error) {
        status.textContent = "❌ Error: " + error.message;
        console.error(error);
      }
    }

    function handleNotification(event) {
      const value = event.target.value;
      const hex = Array.from(new Uint8Array(value.buffer))
                       .map(b => b.toString(16).padStart(2, '0'))
                       .join('');

      console.log("Datos recibidos:", hex);

      if (hex.length >= 12 && hex.startsWith('10')) {
        const weightRaw = parseInt(hex.substring(6, 10), 16);
        const weightKg = weightRaw / 100;

        document.getElementById('status').innerHTML = 
          `✅ <b>Peso: ${weightKg.toFixed(2)} kg</b><br><small>${new Date().toLocaleTimeString()}</small>`;
      }
    }
  </script>
</body>
</html>
