<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PREDICTACORE TITAN - CLÍNICO</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: auto; }
        .card { background: #1e293b; border-radius: 15px; padding: 15px; border: 1px solid #334155; }
        .val { font-size: 2rem; font-weight: bold; color: #3b82f6; }
        .input-group { background: #1e293b; padding: 10px; border-radius: 10px; margin-bottom: 10px; text-align: left; }
        input { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 5px; border-radius: 5px; }
        button { background: #2563eb; color: white; padding: 15px; width: 100%; max-width: 400px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>PREDICTACORE <span style="color:#3b82f6">TITAN</span></h2>
    
    <div class="input-group" style="max-width:380px; margin:auto; margin-bottom:15px;">
        <label style="font-size:10px; color:#64748b;">DATOS DEL PACIENTE (PARA CÁLCULO)</label>
        <div style="display:flex; gap:10px; margin-top:5px;">
            <input type="number" id="h" placeholder="Estatura cm" value="175">
            <input type="number" id="age" placeholder="Edad" value="40">
        </div>
    </div>

    <button onclick="conectar()">INICIAR ESCANEO CLÍNICO</button>

    <div class="grid" style="margin-top:20px;">
        <div class="card"><p style="font-size:10px;">PESO</p><div id="peso" class="val">0.0</div></div>
        <div class="card"><p style="font-size:10px;">IMPEDANCIA</p><div id="imp" class="val">0</div></div>
        <div class="card" style="grid-column: span 2; border-color: #10b981;">
            <p style="font-size:10px;">GRASA CORPORAL ESTIMADA</p>
            <div id="percGrasa" class="val" style="color:#10b981;">0.0%</div>
        </div>
    </div>

<script>
    async function conectar() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'QN-Scale' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            const cNoti = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
            const cWrit = await service.getCharacteristic('0000ffe3-0000-1000-8000-00805f9b34fb');

            await cNoti.startNotifications();

            cNoti.addEventListener('characteristicvaluechanged', (e) => {
                let data = new Uint8Array(e.target.value.buffer);
                if (data[0] === 0x10) {
                    let w = ((data[3] << 8) | data[4]) / 100;
                    let z = (data[8] << 8) | data[9];
                    
                    document.getElementById('peso').innerText = w.toFixed(1);
                    if(z > 100) {
                        document.getElementById('imp').innerText = z;
                        calcularComposicion(w, z);
                    }
                }
            });

            setTimeout(() => {
                let cmd = new Uint8Array([0x13, 0x09, 0x15, 0x01, 180, 50, 0x01, 0x00, 0x19]);
                cWrit.writeValueWithoutResponse(cmd);
            }, 1000);

        } catch (e) { alert(e); }
    }

    function calcularComposicion(w, z) {
        let h = parseFloat(document.getElementById('h').value);
        let age = parseFloat(document.getElementById('age').value);
        
        // Algoritmo de Bioimpedancia
        let tbw = (0.396 * (Math.pow(h, 2) / z)) + (0.143 * w) + 8.4;
        let ffm = tbw / 0.73;
        let fatMass = w - ffm;
        let fatPerc = (fatMass / w) * 100;

        document.getElementById('percGrasa').innerText = fatPerc.toFixed(1) + "%";
    }
</script>
</body>
</html>
