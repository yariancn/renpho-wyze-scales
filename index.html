<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TITAN BLUETOOTH TEST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .data-card { background: #1e293b; border-radius: 20px; padding: 20px; margin: 10px 0; border: 1px solid #334155; }
        .val { font-size: 2.5rem; font-weight: 900; color: #3b82f6; }
        #debug { font-size: 10px; text-align: left; background: black; padding: 10px; border-radius: 10px; height: 150px; overflow-y: auto; font-family: monospace; color: #10b981; }
    </style>
</head>
<body>

    <h1 class="text-xl font-black mb-6">PREDICTACORE <br> <span class="text-blue-500">TEST DE BÁSCULA</span></h1>

    <button onclick="conectarBascula()" class="bg-blue-600 text-white px-8 py-4 rounded-full font-bold mb-8">
        CONECTAR BÁSCULA
    </button>

    <div id="status" class="text-gray-400 text-sm mb-4">Estado: Esperando...</div>

    <div class="grid grid-cols-1 gap-4 max-w-sm mx-auto">
        <div class="data-card">
            <p class="text-xs opacity-50">PESO</p>
            <p id="peso" class="val">0.00 kg</p>
        </div>
        <div class="data-card">
            <p class="text-xs opacity-50">IMPEDANCIA</p>
            <p id="impedancia" class="val">0 Ω</p>
        </div>
    </div>

    <div id="debug" class="max-w-sm mx-auto mt-6">Logs del sistema...</div>

<script>
    const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
    const NOTIFY_UUID  = "0000ffe1-0000-1000-8000-00805f9b34fb";
    const WRITE_UUID   = "0000ffe3-0000-1000-8000-00805f9b34fb";

    function log(msg) {
        const d = document.getElementById('debug');
        d.innerHTML += "<br>> " + msg;
        d.scrollTop = d.scrollHeight;
    }

    async function conectarBascula() {
        try {
            log("Buscando báscula...");
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'QN-Scale' }],
                optionalServices: [SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            log("Conectado.");
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(NOTIFY_UUID);
            const writeChar = await service.getCharacteristic(WRITE_UUID);

            await characteristic.startNotifications();

            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                let data = event.target.value;
                let header = data.getUint8(0);

                if (header === 0x10) {
                    let peso = ((data.getUint8(3) << 8) | data.getUint8(4)) / 100;
                    document.getElementById('peso').innerText = peso.toFixed(2) + " kg";
                } else {
                    for (let i = 0; i < data.byteLength - 1; i++) {
                        let val = (data.getUint8(i) << 8) | data.getUint8(i+1);
                        // Filtro de impedancia detectado en Mac
                        if (val > 350 && val < 900) {
                            document.getElementById('impedancia').innerText = val + " Ω";
                            log("⚡ IMPEDANCIA DETECTADA: " + val);
                        }
                    }
                }
            });

            log("Enviando ráfaga de despertar...");
            
            // Datos de usuario para el Handshake
            const sex = 0x01; // Masc
            const height = 180;
            const age = 50;
            
            // Comando 1: Sincronización (Tipo 0x10)
            const syncCmd = new Uint8Array([0x13, 0x09, 0x15, 0x01, 0x10, 0x00, 0x00, 0x00, 0x42]);
            
            // Comando 2: Datos de Usuario (Tipo 0x15) con Checksum XOR
            const userCmd = new Uint8Array([0x13, 0x09, 0x15, sex, height, age, 0x00, 0x00, 0x42]);

            // Ejecución secuencial para Bluefy
            async function enviar(cmd) {
                try {
                    await writeChar.writeValueWithResponse(cmd);
                } catch(e) {
                    await writeChar.writeValueWithoutResponse(cmd);
                }
            }

            await enviar(syncCmd);
            await new Promise(r => setTimeout(r, 800));
            await enviar(userCmd);
            log("Comandos enviados. Súbete descalzo.");

            document.getElementById('status').innerText = "ESPERANDO DATOS...";

        } catch (error) {
            log("ERROR: " + error);
        }
    }
</script>
</body>
</html>
