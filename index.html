<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RESCATE TITAN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif; padding-top:50px;">

    <button onclick="conectar()" style="padding:30px; background:blue; color:white; font-weight:bold; border-radius:15px; border:none;">
        PASO 1: CONECTAR BÁSCULA
    </button>

    <div id="status" style="margin:20px; color:gray;">Estado: Esperando...</div>

    <div style="font-size:40px; margin:20px;">
        <span id="peso">0.00</span> kg<br>
        <span id="imp" style="color:cyan;">0</span> Ω
    </div>

    <div id="debug" style="font-size:10px; color:green; text-align:left; padding:20px; font-family:monospace;"></div>

<script>
    async function conectar() {
        const log = m => document.getElementById('debug').innerHTML += "<br>> " + m;
        const status = document.getElementById('status');
        
        try {
            log("Buscando...");
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'QN-Scale' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            log("Conectando al servidor GATT...");
            const server = await device.gatt.connect();
            status.innerText = "¡CONECTADO! ✅";
            log("Conexión GATT exitosa.");

            // ESPERA OBLIGATORIA PARA EL IPAD
            await new Promise(r => setTimeout(r, 1500));

            log("Buscando Servicio...");
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            
            log("Buscando Características...");
            const charNoti = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
            const charWrit = await service.getCharacteristic('0000ffe3-0000-1000-8000-00805f9b34fb');

            await charNoti.startNotifications();
            log("Escuchando datos...");

            charNoti.addEventListener('characteristicvaluechanged', (e) => {
                let d = e.target.value;
                if (d.getUint8(0) === 0x10) {
                    let p = ((d.getUint8(3) << 8) | d.getUint8(4)) / 100;
                    document.getElementById('peso').innerText = p.toFixed(2);
                }
                for (let i = 0; i < d.byteLength - 1; i++) {
                    let v = (d.getUint8(i) << 8) | d.getUint8(i+1);
                    if (v > 300 && v < 1000) {
                        document.getElementById('imp').innerText = v;
                        log("⚡ OHMS: " + v);
                    }
                }
            });

            log("Enviando activación...");
            // Comando limpio de 9 bytes que funcionó en la Mac
            const cmd = new Uint8Array([0x13, 0x09, 0x15, 0x01, 180, 50, 0x00, 0x00, 0x42]);
            
            // En iPad, writeValue sin respuesta es más estable al inicio
            await charWrit.writeValueWithoutResponse(cmd);
            log("Listo. Písala y quédate arriba.");

        } catch (e) {
            log("ERROR: " + e);
            status.innerText = "Error: " + e;
        }
    }
</script>
</body>
</html>
