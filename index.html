<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TITAN - CAPTURA DE PESO</title>
</head>
<body style="background:#0a0f1d; color:white; text-align:center; font-family:sans-serif; padding-top:30px;">

    <h2 style="font-size:16px; opacity:0.7;">REPORTE TITAN: CAPTURA DE FLUJO</h2>
    
    <button onclick="conectar()" style="padding:20px; background:#2563eb; color:white; border-radius:15px; border:none; font-weight:bold; width:80%;">
        CONECTAR Y ESCUCHAR
    </button>

    <div style="margin:30px;">
        <div style="background:#161e31; padding:20px; border-radius:15px; margin-bottom:10px;">
            <p style="font-size:12px; opacity:0.5;">PESO DETECTADO</p>
            <span id="peso" style="font-size:40px; font-weight:bold; color:#3b82f6;">0.00</span> kg
        </div>
        <div style="background:#161e31; padding:20px; border-radius:15px;">
            <p style="font-size:12px; opacity:0.5;">IMPEDANCIA DETECTADA</p>
            <span id="imp" style="font-size:40px; font-weight:bold; color:#06b6d4;">0</span> Ω
        </div>
    </div>

    <div id="debug" style="font-size:10px; color:#10b981; text-align:left; padding:20px; font-family:monospace; height:150px; overflow:auto;"></div>

<script>
    async function conectar() {
        const log = m => { const d = document.getElementById('debug'); d.innerHTML += "<br>> " + m; d.scrollTop = d.scrollHeight; };
        try {
            log("Buscando QN-Scale...");
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'QN-Scale' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            const cNoti = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
            const cWrit = await service.getCharacteristic('0000ffe3-0000-1000-8000-00805f9b34fb');

            // ESCUCHA INMEDIATA
            await cNoti.startNotifications();
            log("✅ ESCUCHANDO FLUJO...");

            cNoti.addEventListener('characteristicvaluechanged', (e) => {
                let d = e.target.value;
                let raw = new Uint8Array(d.buffer);
                
                // 1. Prioridad: Peso (0x10)
                if (raw[0] === 0x10) {
                    let p = ((raw[3] << 8) | raw[4]) / 100;
                    if (p > 0) {
                        document.getElementById('peso').innerText = p.toFixed(2);
                        log("⚖️ Peso recibido: " + p);
                    }
                }
                
                // 2. Escaneo de Impedancia (lo que ya te funcionó 4 veces)
                for (let i = 0; i < raw.length - 1; i++) {
                    let v = (raw[i] << 8) | raw[i+1];
                    if (v > 350 && v < 950) {
                        document.getElementById('imp').innerText = v;
                        log("⚡ OHMS: " + v);
                    }
                }
            });

            // Handshake con delay para no bloquear el peso
            setTimeout(async () => {
                log("Enviando activación de sensores...");
                const cmd = new Uint8Array([0x13, 0x09, 0x15, 0x01, 180, 50, 0x00, 0x00, 0x42]);
                await cWrit.writeValueWithoutResponse(cmd);
            }, 2000);

        } catch (e) { log("ERR: " + e); }
    }
</script>
</body>
</html>
