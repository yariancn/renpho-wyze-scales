<!DOCTYPE html>
<html lang="es">
<body>
    <button onclick="test()" style="padding:50px; width:100%; font-size:20px;">FORZAR ENCENDIDO BT</button>
    <div id="log"></div>
<script>
    async function test() {
        const log = m => document.getElementById('log').innerHTML += "<br>" + m;
        try {
            log("Buscando...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"]
            });
            log("Conectando a: " + device.name);
            const server = await device.gatt.connect();
            log("✅ ¡CONECTADO! Mira el símbolo en la báscula.");
            
            // Si el símbolo prende, el problema de conexión está resuelto.
        } catch (e) { log("Error: " + e); }
    }
</script>
</body>
</html>
