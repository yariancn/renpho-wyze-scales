<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TITAN - CONEXIÓN ESTABLE</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; border-radius: 20px; padding: 30px; margin: 20px auto; max-width: 320px; border: 1px solid #334155; }
        .val { font-size: 4rem; font-weight: 900; color: #3b82f6; line-height: 1; }
        .label { font-size: 10px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        #debug { font-size: 10px; text-align: left; background: #000; padding: 15px; height: 120px; overflow: auto; color: #10b981; font-family: monospace; border-radius: 10px; margin-top: 20px; }
        button { background: #2563eb; color: white; padding: 20px; width: 100%; max-width: 320px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h1 style="font-size: 1.5rem; font-weight: 900; margin-bottom: 5px;">PREDICTACORE</h1>
    <p style="color:#64748b; font-size: 11px; margin-bottom: 30px;">PROTOCOLO TITAN V1.0</p>

    <button onclick="conectar()">CONECTAR BÁSCULA</button>

    <div class="card">
        <p class="label">Peso Corporal</p>
        <div id="peso" class="val">0.00</div>
        <p style="color: #3b82f6; font-weight: bold; margin-top: 10px;">KG</p>
    </div>

    <div class="card" style="border-color: #06b6d4;">
        <p class="label">Impedancia</p>
        <div id="imp" class="val" style="color: #06b6d4; font-size: 3rem;">0</div>
        <p style="color: #06b6d4; font-weight: bold; margin-top: 5px;">OHMS (Ω)</p>
    </div>

    <div id="debug">Sistema listo. Presiona conectar...</div>

<script>
    async function conectar() {
        const log = m => { 
            const d = document.getElementById('debug');
            d.innerHTML += "<br>> " + m; 
            d.scrollTop = d.scrollHeight; 
        };
        
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'QN-Scale' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            const cNoti = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
            const cWrit = await service.getCharacteristic('0000ffe3-0000-1000-8000-00805f9b34fb');

            await cNoti.startNotifications();
            log("✅ CONECTADO AL IPAD");

            cNoti.addEventListener('characteristicvaluechanged', (e) => {
                let data = new Uint8Array(e.target.value.buffer);
                
                // Procesar solo los paquetes de medición (Header 0x10)
                if (data[0] === 0x10 && data.length >= 10) {
                    
                    // EXTRAER PESO EXACTO (Posiciones 3 y 4)
                    let p = ((data[3] << 8) | data[4]) / 100;
                    if (p > 5) { // Filtro de seguridad
                        document.getElementById('peso').innerText = p.toFixed(2);
                    }

                    // EXTRAER IMPEDANCIA EXACTA (Posiciones 8 y 9)
                    let ohms = (data[8] << 8) | data[9];
                    // La báscula manda 0 al principio, solo mostramos cuando ya hay lectura (ej. 494)
                    if (ohms > 100) {
                        document.getElementById('imp').innerText = ohms;
                    }
                }
            });

            // EL HANDSHAKE QUE ABRIÓ LA PUERTA (Checksum 0x19)
            setTimeout(() => {
                let cmd = new Uint8Array([0x13, 0x09, 0x15, 0x01, 180, 50, 0x01, 0x00, 0x19]);
                cWrit.writeValueWithoutResponse(cmd).catch(()=>{});
                log("Sensores y BT activados correctamente.");
            }, 1000);

        } catch (e) { log("ERROR: " + e); }
    }
</script>
</body>
</html>
