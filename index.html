<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN BLUETOOTH TEST - IPAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .data-card { background: #1e293b; border-radius: 20px; padding: 20px; margin: 10px 0; border: 1px solid #334155; }
        .val { font-size: 2.5rem; font-weight: 900; color: #3b82f6; }
        #debug { font-size: 10px; text-align: left; background: black; padding: 10px; border-radius: 10px; height: 150px; overflow-y: auto; font-family: monospace; color: #10b981; }
    </style>
</head>
<body>

    <h1 class="text-xl font-black mb-6 uppercase tracking-widest">PredictaCore <br> <span class="text-blue-500 text-sm">Escáner de Impedancia iPad</span></h1>

    <button onclick="conectarBascula()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-full font-bold shadow-lg mb-8 active:scale-95 transition-transform">
        CONECTAR BÁSCULA
    </button>

    <div id="status" class="text-gray-400 text-sm mb-4">Estado: Esperando conexión...</div>

    <div class="grid grid-cols-1 gap-4 max-w-sm mx-auto">
        <div class="data-card">
            <p class="text-xs uppercase opacity-50 tracking-widest">Peso Actual</p>
            <p id="peso" class="val">0.00 kg</p>
        </div>
        <div class="data-card">
            <p class="text-xs uppercase opacity-50 tracking-widest">Impedancia</p>
            <p id="impedancia" class="val">0 Ω</p>
        </div>
    </div>

    <div class="max-w-sm mx-auto mt-6">
        <p class="text-[10px] text-gray-500 uppercase mb-2">Logs del Sistema</p>
        <div id="debug">Inicie conexión...</div>
    </div>

<script>
    const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
    const NOTIFY_UUID  = "0000ffe1-0000-1000-8000-00805f9b34fb";
    const WRITE_UUID   = "0000ffe3-0000-1000-8000-00805f9b34fb";

    function log(msg) {
        const d = document.getElementById('debug');
        d.innerHTML += "<br>> " + msg;
        d.scrollTop = d.scrollHeight;
    }

    async function conectarBascula() {
        try {
            if (!navigator.bluetooth) {
                log("❌ Web Bluetooth no disponible");
                return;
            }

            log("Buscando QN-Scale...");
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'QN-Scale' }],
                optionalServices: [SERVICE_UUID]
            });

            log("Conectando a dispositivo...");
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(NOTIFY_UUID);
            const writeChar = await service.getCharacteristic(WRITE_UUID);

            document.getElementById('status').innerText = "Estado: CONECTADO ✅";
            log("Suscrito. Configurando flujo...");

            await characteristic.startNotifications();
            
            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                let data = event.target.value;
                let header = data.getUint8(0);

                // Lectura de Peso
                if (header === 0x10) {
                    let peso = ((data.getUint8(3) << 8) | data.getUint8(4)) / 100;
                    document.getElementById('peso').innerText = peso.toFixed(2) + " kg";
                } 
                // Escaneo de Impedancia en flujo de datos
                else {
                    for (let i = 0; i < data.byteLength - 1; i++) {
                        let val = (data.getUint8(i) << 8) | data.getUint8(i+1);
                        if (val > 350 && val < 900) {
                            document.getElementById('impedancia').innerText = val + " Ω";
                            log("⚡ IMPEDANCIA: " + val + " Ohms");
                        }
                    }
                }
            });

            // RÁFAGA DE ACTIVACIÓN REFORZADA (Basada en protocolo Python exitoso)
            log("Enviando ráfaga de activación...");
            const sex_b = 0x01; // Masculino
            const h_b = 180;    // Altura cm
            const a_b = 50;     // Edad
            const user_cmd = new Uint8Array([0x13, 0x09, 0x15, sex_b, h_b, a_b, 0x00, 0x00, 0x42]);

            // Triple envío para asegurar despertar los electrodos en iOS
            await writeChar.writeValue(user_cmd);
            await new Promise(r => setTimeout(r, 600));
            await writeChar.writeValue(user_cmd);
            await new Promise(r => setTimeout(r, 600));
            await writeChar.writeValue(user_cmd);
            
            log("LISTO. Súbete descalzo ahora.");

        } catch (error) {
            log("ERROR: " + error);
        }
    }
</script>
</body>
</html>
