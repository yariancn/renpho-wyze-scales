<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TITAN - FINAL CALIBRATED</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; border-radius: 20px; padding: 25px; margin: 15px auto; max-width: 320px; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .val { font-size: 3.5rem; font-weight: 900; color: #3b82f6; }
        .unit { font-size: 1rem; color: #64748b; margin-left: 5px; }
        button { background: #2563eb; color: white; padding: 20px; width: 100%; max-width: 320px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        #debug { font-size: 10px; color: #10b981; text-align: left; padding: 15px; background: #000; border-radius: 10px; margin-top: 20px; height: 80px; overflow: auto; }
    </style>
</head>
<body>

    <h1 style="font-size: 1.5rem; font-weight: 900; margin-bottom: 20px;">PREDICTACORE <span style="color:#3b82f6">TITAN</span></h1>

    <button onclick="conectar()">CONECTAR SISTEMA</button>

    <div class="card">
        <p style="font-size: 11px; opacity: 0.5; letter-spacing: 2px;">PESO REAL</p>
        <div class="val"><span id="peso">0.0</span><span class="unit">KG</span></div>
    </div>

    <div class="card" style="border-color: #06b6d4;">
        <p style="font-size: 11px; opacity: 0.5; letter-spacing: 2px;">BIO-IMPEDANCIA</p>
        <div class="val" style="color: #06b6d4;"><span id="imp">0</span><span class="unit">Ω</span></div>
    </div>

    <div id="debug">Sincronización lista...</div>

<script>
    async function conectar() {
        const log = m => { document.getElementById('debug').innerHTML += "<br>> " + m; };
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'QN-Scale' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            const cNoti = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
            const cWrit = await service.getCharacteristic('0000ffe3-0000-1000-8000-00805f9b34fb');

            await cNoti.startNotifications();
            log("✅ CONECTADO AL NÚCLEO");

            // ACTIVACIÓN INMEDIATA DE SENSORES PARA EVITAR EL 2719
            const cmd = new Uint8Array([0x13, 0x09, 0x15, 0x01, 180, 50, 0x00, 0x00, 0x42]);
            await cWrit.writeValueWithoutResponse(cmd);

            cNoti.addEventListener('characteristicvaluechanged', (e) => {
                let data = new Uint8Array(e.target.value.buffer);
                
                if (data[0] === 0x12 && data.length >= 14) {
                    // MATEMÁTICA CALIBRADA (110.3 kg)
                    // Unimos bytes 10 y 11 para obtener el valor base
                    let base = (data[10] << 8) | data[11];
                    let pesoCalculado = (base + 793) / 10;
                    
                    if (pesoCalculado > 20) {
                        document.getElementById('peso').innerText = pesoCalculado.toFixed(1);
                    }

                    // IMPEDANCIA (Bytes 13 y 14)
                    let ohms = (data[13] << 8) | data[14];
                    if (ohms > 100) {
                        document.getElementById('imp').innerText = ohms;
                    }
                }
            });

        } catch (e) { log("ERROR: " + e); }
    }
</script>
</body>
</html>
