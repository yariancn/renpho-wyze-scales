<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TITAN - ANALIZADOR DE RÁFAGAS</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; border-radius: 20px; padding: 25px; margin: 15px auto; max-width: 320px; border: 1px solid #334155; }
        .val { font-size: 3rem; font-weight: 900; color: #3b82f6; }
        #status { font-size: 12px; color: #64748b; margin-bottom: 10px; text-transform: uppercase; }
        #debug { font-size: 10px; text-align: left; background: #000; padding: 15px; height: 200px; overflow-y: auto; color: #10b981; font-family: monospace; border-radius: 10px; margin-top: 20px; }
        button { background: #2563eb; color: white; padding: 20px; width: 100%; max-width: 320px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; }
        .progress-bar { width: 0%; height: 4px; background: #3b82f6; transition: width 0.3s; margin-top: 10px; border-radius: 2px; }
    </style>
</head>
<body>

    <h1 style="font-size: 1.5rem; font-weight: 900; margin-bottom: 5px;">TITAN <span style="color:#3b82f6">RECORDER</span></h1>
    <p id="status">Listo para capturar ráfagas</p>

    <button onclick="iniciarCaptura()">INICIAR CAPTURA TOTAL</button>

    <div class="card">
        <p style="font-size: 11px; opacity: 0.5;">RESULTADO ANALIZADO</p>
        <div id="pesoFinal" class="val">0.0</div>
        <div id="impFinal" style="font-size: 1.5rem; color: #06b6d4;">0 Ω</div>
        <div id="bar" class="progress-bar"></div>
    </div>

    <div id="debug">Logs de ráfagas acumuladas...</div>

<script>
    let acumuladorHex = [];
    let estaConectado = false;

    async function iniciarCaptura() {
        const d = document.getElementById('debug');
        const status = document.getElementById('status');
        const log = m => { d.innerHTML += "<br>> " + m; d.scrollTop = d.scrollHeight; };
        
        acumuladorHex = [];
        document.getElementById('pesoFinal').innerText = "---";
        document.getElementById('bar').style.width = "0%";

        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'QN-Scale' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            const server = await device.gatt.connect();
            estaConectado = true;
            status.innerText = "🔴 GRABANDO DATOS...";
            log("Conexión establecida. Acumulando ráfagas...");

            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            const cNoti = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

            await cNoti.startNotifications();

            cNoti.addEventListener('characteristicvaluechanged', (e) => {
                let data = new Uint8Array(e.target.value.buffer);
                let hexStr = Array.from(data).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
                
                acumuladorHex.push(hexStr);
                document.getElementById('bar').style.width = (acumuladorHex.length * 5) + "%";
                log("Ráfaga " + acumuladorHex.length + ": " + hexStr);
            });

            // Detectar cuando la báscula se desconecta (fin de transmisión)
            device.addEventListener('gattserverdisconnected', () => {
                estaConectado = false;
                status.innerText = "✅ CAPTURA FINALIZADA. ANALIZANDO...";
                analizarDatosAcumulados();
            });

        } catch (e) { log("ERROR: " + e); }
    }

    function analizarDatosAcumulados() {
        if (acumuladorHex.length === 0) return;

        // 1. Contar frecuencia de ráfagas para encontrar la estable
        let frecuencias = {};
        acumuladorHex.forEach(rafaga => {
            frecuencias[rafaga] = (frecuencias[rafaga] || 0) + 1;
        });

        // 2. Obtener la ráfaga que más se repitió al final (Moda)
        let rafagaGanadora = acumuladorHex[0];
        let maxFrec = 0;
        
        // Priorizamos las ráfagas que aparecen hacia el final del pesaje
        for (let rafaga in frecuencias) {
            if (frecuencias[rafaga] >= maxFrec) {
                maxFrec = frecuencias[rafaga];
                rafagaGanadora = rafaga;
            }
        }

        console.log("Ráfaga analizada como estable:", rafagaGanadora);
        procesarHexFinal(rafagaGanadora);
    }

    function procesarHexFinal(hex) {
        // Convertir HEX de nuevo a bytes
        let bytes = [];
        for (let i = 0; i < hex.length; i += 2) {
            bytes.push(parseInt(hex.substr(i, 2), 16));
        }

        // Aplicamos la lógica de tu báscula 0x12 (Qingniu)
        if (bytes[0] === 0x12) {
            // Peso: bytes 10 y 11 (los que nos dieron el 310 anteriormente)
            let base = (bytes[10] << 8) | bytes[11];
            let pesoReal = (base + 793) / 10;

            // Impedancia: bytes 13 y 14
            let ohms = (bytes[13] << 8) | bytes[14];

            document.getElementById('pesoFinal').innerText = pesoReal.toFixed(1);
            document.getElementById('impFinal').innerText = ohms + " Ω";
            document.getElementById('status').innerText = "LECTURA PROCESADA CON ÉXITO";
        }
    }
</script>
</body>
</html>
