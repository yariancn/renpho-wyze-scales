<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TITAN - LECTOR FINAL</title>
</head>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif; padding-top:50px;">

    <button onclick="conectar()" style="padding:25px; background:blue; color:white; font-weight:bold; border-radius:15px; border:none;">
        CONECTAR Y LEER DATOS
    </button>

    <div style="font-size:40px; margin:20px;">
        <span id="peso">0.00</span> kg<br>
        <span id="imp" style="color:cyan;">0</span> Ω
    </div>

    <div id="debug" style="font-size:10px; color:#10b981; text-align:left; padding:20px; font-family:monospace; height:150px; overflow:auto;"></div>

<script>
    async function conectar() {
        const log = m => { document.getElementById('debug').innerHTML += "<br>> " + m; };
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'QN-Scale' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            const cNoti = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

            await cNoti.startNotifications();
            log("✅ Leyendo flujo QN...");

            cNoti.addEventListener('characteristicvaluechanged', (e) => {
                let data = new Uint8Array(e.target.value.buffer);
                
                // Mapeo directo según tus logs:
                // El peso viene en la posición 11 y 12 de la cadena 0x12
                if (data[0] === 0x12 && data.length >= 14) {
                    
                    // PESO: bytes index 11 y 12
                    let pesoRaw = (data[11] << 8) | data[12];
                    let pesoFinal = pesoRaw / 10; // Según el log 01 36 = 310 = 31.0kg
                    document.getElementById('peso').innerText = pesoFinal.toFixed(1);

                    // IMPEDANCIA: bytes index 13 y 14
                    let impRaw = (data[13] << 8) | data[14];
                    if (impRaw > 0) {
                        document.getElementById('imp').innerText = impRaw;
                    }
                }
            });

        } catch (e) { log("ERR: " + e); }
    }
</script>
</body>
</html>
